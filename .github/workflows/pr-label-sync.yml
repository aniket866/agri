name: Sync PR Labels and Assignees

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-pr-data:
    runs-on: ubuntu-latest

    steps:
      - name: Sync labels and assignees from linked issues
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            if (!pr) {
              console.log("No PR found.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`Processing PR #${pr.number}`);

            // Fetch latest PR data
            const { data: freshPR } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number
            });

            const body = freshPR.body || "";

            console.log("PR Body:");
            console.log(body);

            // Extract linked issues ONLY from:
            // Fixes #123
            // Closes #123
            // Resolves #123
            const matches = [
              ...body.matchAll(
                /(fixes|closes|resolves)\s*:?\s+#(\d+)/gi
              )
            ];

            const issueNumbers = [
              ...new Set(
                matches.map(m => Number(m[2]))
              )
            ];

            console.log("Linked Issues:", issueNumbers);

            if (issueNumbers.length === 0) {
              console.log("No linked issues found.");
              return;
            }

            // Fetch current PR data
            const { data: prIssue } =
              await github.rest.issues.get({
                owner,
                repo,
                issue_number: pr.number
              });

            const existingLabels =
              prIssue.labels.map(label => label.name);

            const existingAssignees =
              prIssue.assignees.map(a => a.login);

            console.log("Existing labels:", existingLabels);
            console.log("Existing assignees:", existingAssignees);

            let labelsToAdd = [];
            let assigneesToAdd = [];

            // Process all linked issues
            for (const issue_number of issueNumbers) {

              try {

                const { data: issue } =
                  await github.rest.issues.get({
                    owner,
                    repo,
                    issue_number
                  });

                // Skip if linked item is PR
                if (issue.pull_request) {
                  console.log(
                    `#${issue_number} is a PR. Skipping.`
                  );
                  continue;
                }

                console.log(
                  `Processing issue #${issue_number}`
                );

                // Collect labels
                const issueLabels =
                  issue.labels.map(label => label.name);

                labelsToAdd.push(...issueLabels);

                // Collect assignees
                const issueAssignees =
                  issue.assignees.map(a => a.login);

                assigneesToAdd.push(...issueAssignees);

                console.log(
                  `Issue labels:`,
                  issueLabels
                );

                console.log(
                  `Issue assignees:`,
                  issueAssignees
                );

              } catch (error) {

                console.log(
                  `Failed fetching issue #${issue_number}:`,
                  error.message
                );
              }
            }

            // Remove duplicate labels
            labelsToAdd = [
              ...new Set(labelsToAdd)
            ].filter(
              label =>
                label &&
                !existingLabels.includes(label)
            );

            // Remove duplicate assignees
            assigneesToAdd = [
              ...new Set(assigneesToAdd)
            ].filter(
              assignee =>
                assignee &&
                !existingAssignees.includes(assignee)
            );

            console.log("Labels to add:", labelsToAdd);
            console.log("Assignees to add:", assigneesToAdd);

            // Add labels
            if (labelsToAdd.length > 0) {

              try {

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pr.number,
                  labels: labelsToAdd
                });

                console.log(
                  `Added labels: ${labelsToAdd.join(", ")}`
                );

              } catch (error) {

                console.log(
                  "Failed adding labels:",
                  error.message
                );
              }

            } else {

              console.log("No labels to add.");
            }

            // Assign PR
            if (assigneesToAdd.length > 0) {

              try {

                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: pr.number,
                  assignees: assigneesToAdd
                });

                console.log(
                  `Assigned PR to: ${assigneesToAdd.join(", ")}`
                );

              } catch (error) {

                console.log(
                  "Failed assigning PR:",
                  error.message
                );
              }

            } else {

              console.log("No assignees found.");
            }
