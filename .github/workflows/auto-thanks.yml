name: Auto Thank You

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  thank-user:
    runs-on: ubuntu-latest

    steps:
      - name: Comment on Issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🙏 Thanks for raising this issue! The team will look into it shortly."
            });

      - name: Comment on PR
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🎉 Thanks for opening this PR! A maintainer will review it soon."
            });
