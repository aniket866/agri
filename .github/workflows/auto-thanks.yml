name: Auto Thank You

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  thank-user:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on Issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🙏 Thanks for raising this issue! The team will look into it shortly."
            })

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🎉 Thanks for opening this PR! A maintainer will review it soon."
            })
