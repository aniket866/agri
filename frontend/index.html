<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tractor.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fasal Saathi - Your AI-powered Farming Assistant. Get crop predictions, weather updates, and expert farming advice." />
    <title>Fasal Saathi - AI-Powered Farming Assistant</title>
    
    <!-- Critical Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* Critical Loading Styles */
      :root {
        --bg-color: #0b1220;
        --accent-color: #4caf50;
      }
      body {
        margin: 0;
        background-color: var(--bg-color);
        color: white;
        font-family: 'Poppins', sans-serif;
      }
      .preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s ease-out;
      }
      .preloader-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(76, 175, 80, 0.1);
        border-top: 4px solid var(--accent-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      .preloader p {
        font-size: 1.2rem;
        font-weight: 500;
        letter-spacing: 1px;
        margin: 0;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Google Translate Widget Override */
      #google_translate_element {
        display: none;
      }
      .goog-te-banner-frame {
        display: none !important;
      }
      body {
        top: 0 !important;
      }
      .goog-tooltip {
        display: none !important;
      }
      .goog-tooltip:hover {
        display: none !important;
      }
      .goog-text-highlight {
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
      
      /* Accessibility and Theme helpers */
      .notranslate {
        unicode-bidi: isolate;
      }
    </style>
    
    <script>
      // Navigation height calculation for CSS variables
      (function() {
        function updateNavbarHeight() {
          const vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', updateNavbarHeight);
        updateNavbarHeight();
      })();
      
      // FORCED LANGUAGE CONTROL
      (function() {
        try {
          // Clear any existing Google Translate cookies to ensure a fresh start
          const domains = [window.location.hostname, '.' + window.location.hostname];
          const paths = ['/', ''];
          
          domains.forEach(domain => {
            paths.forEach(path => {
              document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=' + path + '; domain=' + domain + ';';
              document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=' + path + ';';
            });
          });

          // Check for user preference
          const storedLang = localStorage.getItem('agri:preferredLanguage') || 'en';
          
          // Only set translation if it's NOT English
          if (storedLang !== 'en') {
            document.cookie = `googtrans=/en/${storedLang}; path=/;`;
            document.cookie = `googtrans=/en/${storedLang}; path=/; domain=${window.location.hostname};`;
          }
        } catch (e) {
          console.warn('Language init failed:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="preloader">
        <div class="preloader-spinner"></div>
         <p>Loading <span class="notranslate">Fasal Saathi</span>...</p>
      </div>
    </div>
    
    <!-- Google Translate Element (Hidden) -->
    <div id="google_translate_element"></div>
    
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'hi,mr,bn,ta,te,gu,pa,kn,ml,or,as,en',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
        
        // Final fallback to ensure English if needed
        setTimeout(() => {
          const storedLang = localStorage.getItem('agri:preferredLanguage') || 'en';
          if (storedLang === 'en') {
            const combo = document.querySelector('.goog-te-combo');
            if (combo && combo.value !== 'en' && combo.value !== '') {
              combo.value = 'en';
              combo.dispatchEvent(new Event('change'));
            }
          }
        }, 1000);
      }
    </script>
    
    <script
      type="text/javascript"
      src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
      defer
    ></script>
    
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
